<!DOCTYPE html>
<html>
<head>
    <title>Food Ordering System</title>
</head>
<body>

    <h1>Food Ordering System</h1>

    <h2>Menu</h2>
    <ul>
        <li>Pizza - ₹200</li>
        <li>Burger - ₹100</li>
        <li>Pasta - ₹150</li>
    </ul>

    <h2>Order Form</h2>

    <form>
        Name: <input type="text"><br><br>
        Select Item:
        <select>
            <option>Pizza</option>
            <option>Burger</option>
            <option>Pasta</option>
        </select><br><br>

        Quantity: <input type="number"><br><br>

        <button type="submit">Place Order</button>
    </form>

</body>
</html>
